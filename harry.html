<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fauxsierramusic_owner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Code art background container -->
  <!-- Background container -->
  <div class="code-art-container" id="code-container"></div>

  <!-- Main content container -->
  <div class="content-container owner-layout">
    <section class="panel owner-header-panel">
      <div class="owner-header-stack">
        <h1 class="owner-title display-header">owner_harryfox</h1>
        <a class="back-link btn btn-small owner-back-link" href="index.html">&lt;back&gt;</a>
      </div>
    </section>

    <section class="panel owner-card owner-social-panel">
      <div class="owner-media-frame owner-media-frame-social">
        <!-- Instagram embed for harryfoxaus personal account -->
        <iframe
          class="instagram-frame"
          src="https://www.instagram.com/harryfoxaus/embed"
          scrolling="no"
          allowTransparency="true"
          frameborder="0">
        </iframe>
      </div>
    </section>

    <section class="panel owner-card owner-audio-panel">
      <div class="owner-media-frame owner-media-frame-audio">
        <!-- Spotify embed for Spacerunner song "fade" -->
        <iframe
          class="spotify-embed"
          style="border-radius:12px"
          src="https://open.spotify.com/embed/track/0qdnsWBdLTX8cReUG6eXwF?utm_source=generator"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    populateCodeLines();
    // Ensure the page starts at the very top in case embeds shift focus
    window.scrollTo(0, 0);
  </script>
</body>
